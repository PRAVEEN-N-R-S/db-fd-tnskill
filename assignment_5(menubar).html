<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu Bar pandrom</title>

    <style>
        /* Menu bar container */
        nav {
            background-color: #1f4e79;
            padding: 10px 0;
        }

        /* Remove default list styling */
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Menu items */
        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        /* Menu links */
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 15px;
        }

        /* Hover effect */
        nav ul li a:hover {
            background-color: #163a59;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Sports</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <h2 style="text-align:center; margin-top:30px;">
        Welcome to Namma Website
    </h2>

</body>
</html>
