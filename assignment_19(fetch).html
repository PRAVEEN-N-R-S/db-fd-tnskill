<!DOCTYPE html>
<html>
<head>
    <title>FETCH ASSIGNMENT dbfd</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        }

        img {
            border-radius: 50%;
        }

        button {
            margin-top: 15px;
            padding: 8px 15px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h2>Fetch assignment</h2>

    <div class="card">
        <img id="photo" src="" width="100"><br><br>
        <p><strong>Name:</strong> <span id="name">Loading...</span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <button onclick="getUser()">Get Random User</button>
    </div>

    <script>
        function getUser() {
            fetch("https://randomuser.me/api/")
            .then(response => response.json())
            .then(data => {
                let user = data.results[0];

                document.getElementById("photo").src = user.picture.medium;
                document.getElementById("name").innerText = 
                    user.name.first + " " + user.name.last;
                document.getElementById("email").innerText = user.email;
            })
            .catch(error => {
                console.log("Error:", error);
            });
        }

        // Load one user when page loads
        getUser();
    </script>

</body>
</html>

</head>
<body>

    <h2>Fetch User Data</h2>
    <button onclick="getUser()">Get User</button>

    <div class="card" id="userCard" style="display:none;">
        <h3 id="name"></h3>
        <p id="email"></p>
        <p id="city"></p>
    </div>

    <script>
        function getUser() {
            fetch("https://jsonplaceholder.typicode.com/users/1")
            .then(response => response.json())
            .then(data => {
                document.getElementById("name").innerText = data.name;
                document.getElementById("email").innerText = "Email: " + data.email;
                document.getElementById("city").innerText = "City: " + data.address.city;
                document.getElementById("userCard").style.display = "block";
            })
            .catch(error => {
                alert("Error fetching data");
                console.log(error);
            });
        }
    </script>
