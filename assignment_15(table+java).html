<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>table creation + filling data using js</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 6px;
            margin: 5px;
        }
        button {
            padding: 6px 10px;
            margin: 5px;
            cursor: pointer;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Employee  data Entry Form</h2>

<!-- Input Fields -->
<input type="text" id="name" placeholder="Name">
<input type="text" id="department" placeholder="Department">
<input type="number" id="salary" placeholder="Salary">
<button onclick="addEmployee()">Add</button>

<!-- Table -->
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <!-- Rows generated by JavaScript -->
    </tbody>
</table>

<script>
    let employees = [];
    let editIndex = null;

    function addEmployee() {
        const name = document.getElementById("name").value;
        const department = document.getElementById("department").value;
        const salary = document.getElementById("salary").value;

        if (name === "" || department === "" || salary === "") {
            alert("Please fill all fields");
            return;
        }

        if (editIndex === null) {
            // Add new record
            employees.push({ name, department, salary });
        } else {
            // Update existing record
            employees[editIndex] = { name, department, salary };
            editIndex = null;
        }

        clearInputs();
        renderTable();
    }

    function renderTable() {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        // Auto-generate rows using loop
        for (let i = 0; i < employees.length; i++) {
            tableBody.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${employees[i].name}</td>
                    <td>${employees[i].department}</td>
                    <td>${employees[i].salary}</td>
                    <td>
                        <button onclick="editEmployee(${i})">Edit</button>
                        <button onclick="deleteEmployee(${i})">Delete</button>
                    </td>
                </tr>
            `;
        }
    }

    function editEmployee(index) {
        document.getElementById("name").value = employees[index].name;
        document.getElementById("department").value = employees[index].department;
        document.getElementById("salary").value = employees[index].salary;
        editIndex = index;
    }

    function deleteEmployee(index) {
        if (confirm("Are you sure you want to delete?")) {
            employees.splice(index, 1);
            renderTable();
        }
    }

    function clearInputs() {
        document.getElementById("name").value = "";
        document.getElementById("department").value = "";
        document.getElementById("salary").value = "";
    }
</script>

</body>
</html>
