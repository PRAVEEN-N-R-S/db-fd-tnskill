<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Checking</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.container {
    width: 400px;
    margin: 100px auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 0 10px #ccc;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

/* Default rule style = RED */
.rules p {
    color: red;
    font-size: 14px;
    margin: 6px 0;
}

/* Valid rule = GREEN */
.valid {
    color: green !important;
}
</style>
</head>

<body>

<div class="container">
    <h2>Checking Password</h2>

    <input type="password" id="password" placeholder="Enter Password">

    <div class="rules">
        <p id="length">Minimum 8 characters</p>
        <p id="uppercase">At least one uppercase letter</p>
        <p id="lowercase">At least one lowercase letter</p>
        <p id="number">At least one number</p>
        <p id="special">At least one special character (@#$%)</p>
    </div>
</div>

<script>

let password = document.getElementById("password");

password.addEventListener("keyup", function() {

    let value = password.value;

    // Length check
    document.getElementById("length").className =
        value.length >= 8 ? "valid" : "";

    // Uppercase check
    document.getElementById("uppercase").className =
        /[A-Z]/.test(value) ? "valid" : "";

    // Lowercase check
    document.getElementById("lowercase").className =
        /[a-z]/.test(value) ? "valid" : "";

    // Number check
    document.getElementById("number").className =
        /[0-9]/.test(value) ? "valid" : "";

    // Special character check
    document.getElementById("special").className =
        /[@#$%^&*!]/.test(value) ? "valid" : "";

});

</script>

</body>
</html>
